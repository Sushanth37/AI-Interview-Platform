<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a href="/"
           class="navbar-brand">

            AI Interview Platform

        </a>

        <a href="/dashboard"
           class="btn btn-outline-light">

            Dashboard

        </a>

    </div>

</nav>

<div class="container mt-5">

    <h1>Interview History</h1>

    <table class="table table-bordered">

        <tr>
        <th>ID</th>
        <th>Score</th>
        <th>Technical</th>
        <th>Communication</th>
        <th>Confidence</th>
        <th>Date</th>
        <th>Report</th>
        </tr>

        {% for row in records %}

        <tr>

        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ row[6] }}</td>

        <td>
            <a href="/report/{{ row[0] }}"
                class="btn btn-primary btn-sm">
                View Report
            </a>
        </td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
