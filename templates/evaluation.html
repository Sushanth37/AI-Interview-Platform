<!DOCTYPE html>
<html>

<head>

    <title>Interview Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a href="/"
           class="navbar-brand">

            AI Interview Platform

        </a>

        <a href="/dashboard"
           class="btn btn-outline-light">

            Dashboard

        </a>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Interview Report
    </h1>

    <div class="card shadow mb-4">

        <div class="card-body text-center">

            <h2>
                Overall Score: {{ overall }}/100
            </h2>

        </div>

    </div>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h5>Technical</h5>

                    <h2>{{ technical }}</h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h5>Communication</h5>

                    <h2>{{ communication }}</h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h5>Confidence</h5>

                    <h2>{{ confidence }}</h2>

                </div>

            </div>

        </div>

    </div>

    <div class="card shadow mt-4">

        <div class="card-body">

            <h3>
                Detailed Feedback
            </h3>

            <hr>

            <pre style="white-space: pre-wrap;">
{{ feedback }}
            </pre>

        </div>

    </div>

    <div class="text-center mt-4">

        <a href="/dashboard"
           class="btn btn-success">

            View Dashboard

        </a>

        <a href="/"
           class="btn btn-primary">

            New Interview

        </a>

    </div>

</div>

</body>

</html>
